<script type="text/javascript">
	var filterTimer = null;

	function _id2section(id) {
		var x = id.split(".");
		return x[2];
	}

	function _baseUrl() {
		var p = window.location.pathname;
		return p.replace(/\/+$/, '');
	}

	function resetButton(btn, origVal) {
		btn.disabled = false;
		btn.value = origVal;
		btn.style.opacity = "1";
	}

	function showError(btn, origVal) {
		resetButton(btn, origVal);
		alert("<%:Request failed (network error)%>");
	}

	function onclick_awake(id) {
		var section = _id2section(id);
		var btn = document.getElementById(id);
		if (btn.disabled) return;
		var origVal = btn.value;
		btn.disabled = true;
		btn.value = "⏳";
		btn.style.opacity = "0.6";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				resetButton(btn, origVal);
			}
		}, 10000);

		var btnXHR = new XHR();
		btnXHR.post(_baseUrl() + '/awake/' + section,
			{},
			function(x, data) {
				clearTimeout(timeoutId);
				resetButton(btn, origVal);
				if (x.responseText == "_uncommitted_") {
					txt="<%:Please [Save & Apply] your changes first%>";
					alert( txt.replace(new RegExp("<%:&%>", "g"), "&") );
				} else {
					try {
						var resp = JSON.parse(x.response);
						var ts = new Date().toLocaleTimeString();
						alert("<%:Awake request sent%> (" + ts + ")\n" + (resp.data || ""));
					} catch(e) {
						alert("<%:Request failed%>");
					}
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				showError(btn, origVal);
			}
		);
	}

	function awakeAll() {
		if (!confirm("<%:Are you sure you want to wake up all devices?%>")) return;

		var btn = document.getElementById("btn_awakeall");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳ <%:Processing...%>";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 15000);

		var xhr = new XHR();
		xhr.post(_baseUrl() + '/awakeall',
			{},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					if (j.empty) {
						alert("<%:No devices configured%>");
						return;
					}
					var msg = "<%:Wake All Results%>:\n\n";
					j.results.forEach(function(item) {
						msg += (item.success ? "&#x2713;" : "&#x2717;") + " " + (item.name || item.mac) + "\n";
					});
					alert(msg);
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function checkAllStatus() {
		var btn = document.getElementById("btn_check_all");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 10000);

		var xhr = new XHR();
		xhr.post(_baseUrl() + '/status',
			{},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					j.devices.forEach(function(dev) {
						var el = document.getElementById("status_" + dev.section);
						if (el) {
							el.innerHTML = dev.online
								? '<span style="color:green">&#x25cf; <%:Online%></span>'
								: '<span style="color:#999">&#x25cf; <%:Offline%></span>';
							var infoText = "";
							if (dev.hostname) infoText += dev.hostname + " ";
							if (dev.ip) infoText += "(" + dev.ip + ")";
							if (infoText) el.appendChild(document.createTextNode(" " + infoText));
						}
					});
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function importARP() {
		var btn = document.getElementById("btn_import_arp");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 10000);

		var xhr = new XHR();
		xhr.post(_baseUrl() + '/import_arp',
			{},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					if (j.devices.length === 0) {
						alert("<%:No new devices found%>");
						return;
					}
					var msg = "<%:Found devices, please add them manually%>:\n";
					j.devices.forEach(function(d) {
						msg += d.mac + " " + (d.hostname || "") + " (" + d.ip + ")\n";
					});
					alert(msg);
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function filterTable() {
		if (filterTimer) clearTimeout(filterTimer);
		filterTimer = setTimeout(function() {
			var q = document.getElementById("search_box").value.toLowerCase();
			if (q === "") {
				document.querySelectorAll(".cbi-section-table-row").forEach(function(r) { r.style.display = ""; });
				return;
			}
			document.querySelectorAll(".cbi-section-table-row").forEach(function(row) {
				var txt = row.innerText.toLowerCase();
				row.style.display = txt.indexOf(q) >= 0 ? "" : "none";
			});
		}, 150);
	}
</script>
