<%+header%>

<form method="post" action="<%=pcdata(REQUEST_URI)%>" enctype="multipart/form-data" onreset="return cbi_validate_reset(this)" onsubmit="return cbi_validate_form(this, '<%:Some fields are invalid, cannot save values!%>')">
	<div>
		<input type="hidden" name="token" value="<%=token%>" />
		<input type="hidden" name="cbi.submit" value="1" />
		<input type="submit" value="<%:Save%>" class="hidden" />
	</div>

<% include("cbi/map") %>

<div class="cbi-section" style="margin-bottom:8px;padding:8px;">
  <button class="cbi-button cbi-button-apply" id="btn_awakeall" onclick="awakeAll()" style="margin-right:6px;">
    <%:Wake All%>
  </button>
  <button class="cbi-button cbi-input-select" id="btn_check_all" onclick="checkAllStatus()" style="margin-right:6px;">
    <%:Check Status%>
  </button>
  <button class="cbi-button cbi-input-select" id="btn_import_arp" onclick="importARP()" style="margin-right:6px;">
    <%:Import from ARP%>
  </button>
  <input type="text" id="search_box" placeholder="<%:Search...%>" oninput="filterTable()" style="float:right;padding:4px 8px;" />
</div>

<div class="cbi-page-actions">
	<input class="btn cbi-button cbi-button-apply" type="button" value="<%:Save & Apply%>" onclick="cbi_submit(this, 'cbi.apply')" />
	<input class="btn cbi-button cbi-button-save" type="submit" value="<%:Save%>" />
	<input class="btn cbi-button cbi-button-reset" type="button" value="<%:Reset%>" onclick="location.href='<%=REQUEST_URI%>'" />
</div>

</form>

<script type="text/javascript">
	var filterTimer = null;

	function _id2section(id) {
		var x = id.split(".");
		return x[2];
	}

	function resetButton(btn, origVal) {
		btn.disabled = false;
		btn.value = origVal;
		btn.style.opacity = "1";
	}

	function showError(btn, origVal) {
		resetButton(btn, origVal);
		alert("<%:Request failed (network error)%>");
	}

	function onclick_awake(id) {
		var section = _id2section(id);
		var btn = document.getElementById(id);
		if (btn.disabled) return;
		var origVal = btn.value;
		btn.disabled = true;
		btn.value = "⏳";
		btn.style.opacity = "0.6";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				resetButton(btn, origVal);
			}
		}, 10000);

		var btnXHR = new XHR();
		btnXHR.post('<%=url([[admin]], [[services]], [[wolplus]], [[awake]])%>/' + section,
			{ token: '<%=token%>' },
			function(x, data) {
				clearTimeout(timeoutId);
				resetButton(btn, origVal);
				if (x.responseText == "_uncommitted_") {
					txt="<%:Please [Save & Apply] your changes first%>";
					alert( txt.replace(new RegExp("<%:&%>", "g"), "&") );
				} else {
					try {
						var resp = JSON.parse(x.response);
						var ts = new Date().toLocaleTimeString();
						alert("<%:Awake request sent%> (" + ts + ")\n" + (resp.data || ""));
					} catch(e) {
						alert("<%:Request failed%>");
					}
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				showError(btn, origVal);
			}
		);
	}

	function awakeAll() {
		if (!confirm("<%:Are you sure you want to wake up all devices?%>")) return;

		var btn = document.getElementById("btn_awakeall");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳ <%:Processing...%>";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 15000);

		var xhr = new XHR();
		xhr.post('<%=url([[admin]], [[services]], [[wolplus]], [[awakeall]])%>',
			{ token: '<%=token%>' },
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					if (j.empty) {
						alert("<%:No devices configured%>");
						return;
					}
					var msg = "<%:Wake All Results%>:\n\n";
					j.results.forEach(function(item) {
						msg += (item.success ? "&#x2713;" : "&#x2717;") + " " + (item.name || item.mac) + "\n";
					});
					alert(msg);
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function checkAllStatus() {
		var btn = document.getElementById("btn_check_all");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 10000);

		var xhr = new XHR();
		xhr.post('<%=url([[admin]], [[services]], [[wolplus]], [[status]])%>',
			{ token: '<%=token%>' },
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					j.devices.forEach(function(dev) {
						var el = document.getElementById("status_" + dev.section);
						if (el) {
							el.innerHTML = dev.online
								? '<span style="color:green">&#x25cf; <%:Online%></span>'
								: '<span style="color:#999">&#x25cf; <%:Offline%></span>';
							var infoText = "";
							if (dev.hostname) infoText += dev.hostname + " ";
							if (dev.ip) infoText += "(" + dev.ip + ")";
							if (infoText) el.appendChild(document.createTextNode(" " + infoText));
						}
					});
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function importARP() {
		var btn = document.getElementById("btn_import_arp");
		var origText = btn.innerHTML;
		btn.disabled = true;
		btn.innerHTML = "⏳";

		var timeoutId = setTimeout(function() {
			if (btn.disabled) {
				btn.disabled = false;
				btn.innerHTML = origText;
			}
		}, 10000);

		var xhr = new XHR();
		xhr.post('<%=url([[admin]], [[services]], [[wolplus]], [[import_arp]])%>',
			{ token: '<%=token%>' },
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				try {
					var j = JSON.parse(x.response);
					if (j.devices.length === 0) {
						alert("<%:No new devices found%>");
						return;
					}
					var msg = "<%:Found devices, please add them manually%>:\n";
					j.devices.forEach(function(d) {
						msg += d.mac + " " + (d.hostname || "") + " (" + d.ip + ")\n";
					});
					alert(msg);
				} catch(e) {
					alert("<%:Request failed%>");
				}
			},
			function(x) {
				clearTimeout(timeoutId);
				btn.disabled = false;
				btn.innerHTML = origText;
				alert("<%:Request failed (network error)%>");
			}
		);
	}

	function filterTable() {
		if (filterTimer) clearTimeout(filterTimer);
		filterTimer = setTimeout(function() {
			var q = document.getElementById("search_box").value.toLowerCase();
			if (q === "") {
				document.querySelectorAll(".cbi-section-table-row").forEach(function(r) { r.style.display = ""; });
				return;
			}
			document.querySelectorAll(".cbi-section-table-row").forEach(function(row) {
				var txt = row.innerText.toLowerCase();
				row.style.display = txt.indexOf(q) >= 0 ? "" : "none";
			});
		}, 150);
	}
</script>

<script>cbi_init();</script>
<%+footer%>
